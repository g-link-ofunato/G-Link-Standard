<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G-Link Standard 起動画面</title>
  <link rel="stylesheet" href="launcher.css" />
  <link rel="stylesheet" href="license-auth.css?v=Build1515" />
</head>
<body>
  <main id="launcherStage" class="launcher-stage" aria-label="G-Link 起動画面">
    <img class="launcher-bg" src="launcher-bg.png" alt="G-Link 起動画面背景" />

    <section class="launcher-panel" aria-label="G-Link 初期設定">
      <header class="launcher-brand">
        <h1 class="brand-logo">G<span>-</span>Link</h1>
        <h2 class="brand-title">災害情報共有システム</h2>
        <p class="brand-subtitle">Disaster Information Sharing System</p>
        <div class="brand-line" aria-hidden="true"></div>
      </header>

      <section class="feature-list" aria-label="G-Link 機能概要">
        <article class="feature-item">
          <div class="feature-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" focusable="false">
              <path d="M32 52V37" />
              <path d="M22 52h20" />
              <path d="M24 34c-5-5-5-13 0-18" />
              <path d="M40 34c5-5 5-13 0-18" />
              <path d="M18 40c-11-11-11-29 0-40" transform="translate(6 8) scale(.75)" />
              <path d="M46 40c11-11 11-29 0-40" transform="translate(10 8) scale(.75)" />
              <circle cx="32" cy="24" r="6" />
            </svg>
          </div>
          <div class="feature-text">
            <h3>情報収集</h3>
            <p>多様な情報をリアルタイムに収集</p>
          </div>
        </article>

        <article class="feature-item">
          <div class="feature-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" focusable="false">
              <rect x="12" y="12" width="40" height="40" rx="2" />
              <path d="M25 12v40M38 12v40M12 25h40M12 38h40" />
            </svg>
          </div>
          <div class="feature-text">
            <h3>災害の可視化</h3>
            <p>グリッド図で災害状況をわかりやすく可視化</p>
          </div>
        </article>

        <article class="feature-item">
          <div class="feature-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" focusable="false">
              <circle cx="32" cy="22" r="9" />
              <path d="M18 52c2-10 9-16 14-16s12 6 14 16" />
              <path d="M14 52h36" />
            </svg>
          </div>
          <div class="feature-text">
            <h3>状況把握</h3>
            <p>現場の状況を正確に把握・分析</p>
          </div>
        </article>

        <article class="feature-item">
          <div class="feature-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" focusable="false">
              <path d="M25 39l14-14" />
              <path d="M26 18l5-5a12 12 0 0 1 17 17l-5 5" />
              <path d="M38 46l-5 5a12 12 0 0 1-17-17l5-5" />
            </svg>
          </div>
          <div class="feature-text">
            <h3>情報共有</h3>
            <p>必要な情報を関係機関と迅速に共有</p>
          </div>
        </article>
      </section>

      <div class="launcher-mode-select" aria-label="起動方法の選択">
        <button id="newProjectButton" class="launcher-mode-button new" type="button">新規</button>
        <button id="continueProjectButton" class="launcher-mode-button continue" type="button">継続</button>
      </div>

      <form id="launcherForm" class="launch-form launcher-slide-panel hidden" autocomplete="off">
        <div class="panel-title new-title">新しく作成</div>
        <div class="form-row">
          <label for="disasterName">災害名</label>
          <input
            id="disasterName"
            name="disasterName"
            type="text"
            placeholder="例：〇〇〇市大規模災害"
            maxlength="80"
            required
          />
        </div>

        <div class="form-row">
          <label for="createdUnit">作成部隊</label>
          <input
            id="createdUnit"
            name="createdUnit"
            type="text"
            placeholder="例：〇〇〇消防本部　指揮本部"
            maxlength="80"
            required
          />
        </div>

        <button id="startButton" class="start-button" type="submit">
          <span class="start-label">確　定</span>
          <span class="start-arrow" aria-hidden="true">›</span>
        </button>
      </form>

      <section id="continueProjectPanel" class="project-open-panel launcher-slide-panel hidden" aria-label="保存済みプロジェクト">
        <div class="project-open-heading">保存済みプロジェクト</div>
        <p class="project-open-lead">保存した .glink ファイルから、指揮本部モードを再開します。</p>
        <input id="glinkProjectInput" type="file" accept=".glink,application/json" hidden />
        <button id="glinkProjectButton" class="project-open-button" type="button">
          <span>📂 ファイルを選択</span>
        </button>
        <p id="glinkProjectStatus" class="project-open-status" aria-live="polite"></p>
      </section>
    </section>

    <footer class="launcher-footer">
      <span>G-Link Standard Version2026.07.14 Build1515</span>
      <span class="footer-separator">|</span>
      <span>© G-Link Disaster Information Sharing System</span>
    </footer>
  </main>

  <script src="launcher.js?v=Build1515"></script>
  <script src="license-auth.js?v=Build1515"></script>
</body>
</html>
